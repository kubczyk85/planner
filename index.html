<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="theme-color" content="#185FA5">
<meta name="description" content="Miesięczny planner rodzinny — Jakub, Adam, Józek">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Planner Rodzinny</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
  color:#1a1a1a;font-size:15px;
  background:#f0f0ed;
  overscroll-behavior:none;
}
:root{
  --bg:#ffffff;--bg2:#f0f0ed;--bg3:#e2e2de;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.11);--border2:rgba(0,0,0,0.2);
  --r:10px;--rl:14px;
  --touch:48px;
}
@media(prefers-color-scheme:dark){
  body{background:#111}
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  }
  .chip-j{background:#0C447C!important;color:#B5D4F4!important}
  .chip-a{background:#27500A!important;color:#C0DD97!important}
  .chip-z{background:#633806!important;color:#FAC775!important}
  input,select{background:var(--bg3)!important;color:var(--text)!important;border-color:var(--border2)!important}
}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100dvh;height:100vh;overflow:hidden}
.topbar{
  background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:10px 14px 8px;flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 10px 80px}

/* ── Top bar ── */
.month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.month-nav-btn{
  width:var(--touch);height:var(--touch);border-radius:50%;
  border:0.5px solid var(--border2);background:transparent;
  cursor:pointer;color:var(--text);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;
}
.month-nav-btn:active{background:var(--bg3)}
.month-title{font-size:18px;font-weight:600;color:var(--text);text-align:center;flex:1}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.sbar-card{background:var(--bg2);border-radius:var(--r);padding:7px 9px;display:flex;align-items:center;gap:7px}
.sbar-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sbar-info{flex:1;min-width:0}
.sbar-name{font-size:12px;font-weight:600}
.sbar-nums{font-size:11px;color:var(--text2)}
.sbar-pct{font-size:13px;font-weight:600;flex-shrink:0}
.pbar-bg{height:3px;background:var(--border);border-radius:2px;margin-top:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px}

/* ── Tab/view row ── */
.controls-row{display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.controls-row::-webkit-scrollbar{display:none}
.vbtn{
  padding:7px 13px;border-radius:20px;border:0.5px solid var(--border2);
  background:transparent;cursor:pointer;font-size:13px;color:var(--text2);
  white-space:nowrap;flex-shrink:0;min-height:var(--touch);
  display:flex;align-items:center;
}
.vbtn.act{background:var(--bg3);color:var(--text);font-weight:500}
.vbtn:active{background:var(--bg3)}
.rec-vbtn{border-color:#378ADD!important;color:#185FA5!important}

/* ── Bottom nav tabs ── */
.bottom-tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg);border-top:0.5px solid var(--border);
  display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  gap:4px;z-index:20;
}
.btab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:6px 4px;border-radius:var(--r);border:none;background:transparent;
  cursor:pointer;color:var(--text2);font-size:11px;gap:2px;min-height:var(--touch);
}
.btab.act{color:#185FA5;background:#E6F1FB}
.btab-icon{font-size:18px;line-height:1}
.btab:active{background:var(--bg3)}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px}
.day-lbl{text-align:center;font-size:12px;color:var(--text2);padding:4px 0;font-weight:500}
.day-cell{
  border:0.5px solid var(--border);border-radius:var(--r);
  min-height:110px;padding:5px;background:var(--bg);
  cursor:pointer;position:relative;
}
.day-cell:active{background:var(--bg2)}
.day-cell.today{border:2px solid #378ADD}
.day-cell.other-m{opacity:0.28}
.day-cell.weekend-bg{background:linear-gradient(135deg,var(--bg) 0%,#FAEEDA18 100%)}
.day-num{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px;line-height:1}
.we-tag{color:#BA7517;font-size:9px;margin-left:2px;font-weight:600}
.task-block{margin-bottom:3px}
.task-son-lbl{font-size:10px;font-weight:600;line-height:1.3;margin-bottom:1px}
.task-chip{
  display:flex;align-items:center;gap:2px;
  border-radius:5px;padding:2px 5px;font-size:11px;
  cursor:pointer;user-select:none;overflow:hidden;
  min-height:20px;
}
.task-chip.done{opacity:0.42;text-decoration:line-through}
.chip-j{background:#B5D4F4;color:#0C447C}
.chip-a{background:#C0DD97;color:#27500A}
.chip-z{background:#FAC775;color:#633806}
.chip-rec{border-left:2.5px solid rgba(0,0,0,0.18)}
.task-chip:active{opacity:0.7}
.more-b{font-size:10px;color:var(--text3);padding:1px 3px}

/* ── Week view ── */
.week-section{border-top:0.5px solid var(--border);padding-top:8px;margin-bottom:6px}
.week-label{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.week-row{display:grid;grid-template-columns:52px repeat(7,minmax(0,1fr));gap:3px;align-items:start;margin-bottom:3px}
.week-head{font-size:11px;color:var(--text2);text-align:center;padding:3px 0;font-weight:500}
.week-son{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:5px 0;color:var(--text)}
.wcell{
  border:0.5px solid var(--border);border-radius:var(--r);
  min-height:52px;padding:4px;background:var(--bg);cursor:pointer;
}
.wcell:active{background:var(--bg2)}
.wcell.tod{border-color:#378ADD;border-width:1.5px}

/* ── Summary view ── */
.sum-card{border:0.5px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:10px;background:var(--bg)}
.sum-name{font-size:15px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;color:var(--text)}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.sum-box{background:var(--bg2);border-radius:var(--r);padding:9px;text-align:center}
.sum-num{font-size:22px;font-weight:600;color:var(--text)}
.sum-lbl{font-size:11px;color:var(--text2)}
.cp{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.cp-pill{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2)}

/* ── Modal (bottom sheet style for mobile) ── */
.sheet-ov{
  position:fixed;inset:0;background:rgba(0,0,0,0.4);
  z-index:100;display:flex;flex-direction:column;justify-content:flex-end;
}
.sheet{
  background:var(--bg);border-radius:20px 20px 0 0;
  padding:0 16px calc(20px + env(safe-area-inset-bottom));
  max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 14px}
.sheet h3{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text)}
.sheet-close{float:right;background:var(--bg2);border:none;cursor:pointer;font-size:16px;color:var(--text2);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-4px}

/* ── Task rows in sheet ── */
.task-row{
  display:flex;align-items:center;gap:9px;
  padding:10px;border-radius:var(--r);
  border:0.5px solid var(--border);margin-bottom:6px;background:var(--bg);
}
.task-row.done-r{opacity:0.48}
.task-row input[type=checkbox]{
  width:20px;height:20px;accent-color:#378ADD;cursor:pointer;flex-shrink:0;
}
.tri{flex:1;min-width:0}
.trn{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trm{font-size:11px;color:var(--text2);margin-top:1px}
.done-r .trn{text-decoration:line-through;color:var(--text3)}
.delbtn{
  background:transparent;border:none;cursor:pointer;color:var(--text3);
  width:var(--touch);height:var(--touch);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.delbtn:active{background:var(--bg3);color:#E24B4A}

/* ── Form ── */
.add-form{border-top:0.5px solid var(--border);padding-top:14px;margin-top:8px}
.form-lbl{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:5px}
.add-form input[type=text],.add-form select{
  width:100%;margin-bottom:8px;padding:12px;
  border:0.5px solid var(--border2);border-radius:var(--r);
  font-size:15px;background:var(--bg);color:var(--text);
  -webkit-appearance:none;appearance:none;
}
.add-form input[type=text]{min-height:var(--touch)}
.add-form select{min-height:var(--touch)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prow{display:flex;gap:8px;margin-bottom:8px}
.pbtn{
  flex:1;padding:10px 6px;border:0.5px solid var(--border2);
  border-radius:var(--r);background:transparent;cursor:pointer;
  font-size:13px;color:var(--text2);min-height:var(--touch);
}
.pbtn:active{background:var(--bg3)}
.pbtn.s{border-color:#378ADD;background:#E6F1FB;color:#185FA5;font-weight:500}
.abtn{
  width:100%;padding:14px;background:#185FA5;border:none;
  border-radius:var(--r);cursor:pointer;font-size:15px;
  font-weight:600;color:#fff;min-height:var(--touch);
}
.abtn:active{background:#0C447C}

/* ── Recurring panel ── */
.rec-panel{border:0.5px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px;background:var(--bg2)}
.rec-row{
  display:flex;align-items:center;gap:8px;padding:8px 8px;
  border-radius:var(--r);border:0.5px solid var(--border);
  margin-bottom:4px;background:var(--bg);font-size:13px;
}
.rec-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg2);border:0.5px solid var(--border);white-space:nowrap;color:var(--text2)}
.rec-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.rec-type-btn{
  padding:10px 8px;border:0.5px solid var(--border2);border-radius:var(--r);
  background:transparent;cursor:pointer;font-size:12px;color:var(--text2);
  text-align:center;min-height:var(--touch);line-height:1.3;
}
.rec-type-btn:active{background:var(--bg3)}
.rec-type-btn.s{border-color:#378ADD;background:#E6F1FB;color:#185FA5;font-weight:500}
.days-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.day-btn{
  width:44px;height:44px;border:0.5px solid var(--border2);
  border-radius:50%;background:transparent;cursor:pointer;
  font-size:12px;color:var(--text2);font-weight:500;
}
.day-btn.s{border-color:#378ADD;background:#378ADD;color:#fff}
.day-btn:active{opacity:0.7}

/* ── Install banner ── */
.install-banner{
  background:#E6F1FB;border:0.5px solid #85B7EB;
  border-radius:var(--r);padding:10px 12px;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;font-size:13px;color:#185FA5;
}
.install-btn{
  margin-left:auto;padding:6px 12px;background:#185FA5;color:#fff;
  border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;
  white-space:nowrap;min-height:32px;
}
.install-close{background:transparent;border:none;cursor:pointer;color:#185FA5;font-size:16px;padding:4px}

@media print{
  .bottom-tab-bar,.controls-row,.install-banner{display:none!important}
  .day-cell{min-height:70px}
  body{background:white}
}
</style>
</head>
<body>
<div class="app" id="app-root">
  <div class="topbar" id="topbar"></div>
  <div class="scroll-area" id="scroll-area"></div>
  <div class="bottom-tab-bar" id="bottom-tabs"></div>
</div>

<script>
const SONS=[
  {id:'j',name:'Jakub',color:'#185FA5',bg:'#B5D4F4',tc:'#0C447C',cc:'chip-j'},
  {id:'a',name:'Adam',color:'#3B6D11',bg:'#C0DD97',tc:'#27500A',cc:'chip-a'},
  {id:'z',name:'Józek',color:'#BA7517',bg:'#FAC775',tc:'#633806',cc:'chip-z'}
];
const CATS=[
  {id:'school',l:'Szkoła'},{id:'football',l:'Piłka nożna'},
  {id:'home',l:'Dom'},{id:'other',l:'Inne'}
];
const DPL=['Pon','Wt','Śr','Czw','Pt','Sob','Nie'];
const MPL=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

let now=new Date();
let ST={
  y:now.getFullYear(),m:now.getMonth(),
  tasks:{},recTasks:[],
  view:'month',tab:'all',
  sheet:null,recSheet:false,
  showInstall:true
};
let deferredPrompt=null;

const lsK=()=>'planner3_'+ST.y+'_'+ST.m;
const lsRK=()=>'planner3_rec_'+ST.y+'_'+ST.m;

function load(){
  try{const d=localStorage.getItem(lsK());ST.tasks=d?JSON.parse(d):{}}catch(e){ST.tasks={}}
  try{const d=localStorage.getItem(lsRK());ST.recTasks=d?JSON.parse(d):[]}catch(e){ST.recTasks=[]}
}
function save(){
  localStorage.setItem(lsK(),JSON.stringify(ST.tasks));
  localStorage.setItem(lsRK(),JSON.stringify(ST.recTasks));
}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdow(y,m){let d=new Date(y,m,1).getDay();return d===0?6:d-1}
function ds(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function todays(){let t=new Date();return ds(t.getFullYear(),t.getMonth(),t.getDate())}
function isWE(y,m,d){let w=new Date(y,m,d).getDay();return w===0||w===6}
function getDow(y,m,d){let w=new Date(y,m,d).getDay();return w===0?6:w-1}
function sonById(id){return SONS.find(s=>s.id===id)}
function catById(id){return CATS.find(c=>c.id===id)||CATS[3]}

function getTasks(dateStr){
  const manual=ST.tasks[dateStr]||[];
  const dn=new Date(dateStr);const dayD=dn.getDate();
  const dow=getDow(ST.y,ST.m,dayD);const we=isWE(ST.y,ST.m,dayD);
  const rec=[];
  (ST.recTasks||[]).forEach(rt=>{
    let ok=false;
    if(rt.type==='month')ok=true;
    else if(rt.type==='month_noweekend')ok=!we;
    else if(rt.type==='month_weekend')ok=we;
    else if(rt.type==='week')ok=rt.days&&rt.days.includes(dow);
    if(ok)rec.push({...rt,isRec:true,done:!!(ST.tasks[dateStr+'_rec_'+rt.id])});
  });
  return [...rec,...manual];
}
function toggleTask(dateStr,task){
  if(task.isRec){ST.tasks[dateStr+'_rec_'+task.id]=!task.done;}
  else{
    const arr=ST.tasks[dateStr]||[];
    const t=arr.find(t=>t.son===task.son&&t.name===task.name&&!t.isRec);
    if(t)t.done=!t.done;
  }
  save();render();
}
function deleteManualTask(dateStr,task){
  const arr=ST.tasks[dateStr]||[];
  const idx=arr.findIndex(t=>t.son===task.son&&t.name===task.name);
  if(idx>=0){arr.splice(idx,1);if(!arr.length)delete ST.tasks[dateStr];else ST.tasks[dateStr]=arr;}
  save();
}
function addTask(dateStr,t){if(!ST.tasks[dateStr])ST.tasks[dateStr]=[];ST.tasks[dateStr].push(t);save();}
function addRec(t){if(!ST.recTasks)ST.recTasks=[];ST.recTasks.push(t);save();}
function deleteRec(id){ST.recTasks=ST.recTasks.filter(r=>r.id!==id);save();}

function calcStats(){
  const D=dim(ST.y,ST.m);const res={};
  SONS.forEach(s=>{res[s.id]={total:0,done:0,cats:{}}});
  for(let d=1;d<=D;d++){
    getTasks(ds(ST.y,ST.m,d)).forEach(t=>{
      if(!res[t.son])return;
      res[t.son].total++;
      if(t.done)res[t.son].done++;
      const c=t.category||'other';
      res[t.son].cats[c]=(res[t.son].cats[c]||0)+1;
    });
  }
  return res;
}

function render(){
  load();
  const stats=calcStats();
  renderTopbar(stats);
  renderScroll(stats);
  renderBottomTabs();
  if(ST.sheet)renderSheet();
  if(ST.recSheet)renderRecSheet();
}

function renderTopbar(stats){
  const tb=document.getElementById('topbar');
  const install=deferredPrompt&&ST.showInstall?`
    <div class="install-banner">
      <span>Dodaj do ekranu głównego</span>
      <button class="install-btn" id="do-install">Zainstaluj</button>
      <button class="install-close" id="close-install">&#215;</button>
    </div>`:'' ;
  tb.innerHTML=`
    ${install}
    <div class="month-row">
      <button class="month-nav-btn" id="pm">&#8249;</button>
      <span class="month-title">${MPL[ST.m]} ${ST.y}</span>
      <button class="month-nav-btn" id="nm">&#8250;</button>
    </div>
    <div class="summary-bar">
      ${SONS.map(s=>{
        const st=stats[s.id];const pct=st.total?Math.round(st.done/st.total*100):0;
        return `<div class="sbar-card">
          <div class="sbar-dot" style="background:${s.color}"></div>
          <div class="sbar-info">
            <div class="sbar-name" style="color:${s.color}">${s.name}</div>
            <div class="sbar-nums">${st.done}/${st.total}</div>
            <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%;background:${s.color}"></div></div>
          </div>
          <div class="sbar-pct" style="color:${s.color}">${pct}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="controls-row">
      <button class="vbtn ${ST.tab==='all'?'act':''}" data-tab="all">Wszyscy</button>
      ${SONS.map(s=>`<button class="vbtn ${ST.tab===s.id?'act':''}" data-tab="${s.id}" style="${ST.tab===s.id?'border-color:'+s.color+';color:'+s.color:''}">${s.name}</button>`).join('')}
      <button class="vbtn rec-vbtn" id="rec-btn">+ Cykliczne</button>
      <button class="vbtn" id="wakelock-btn">Ekran: wł.</button>
    </div>
  `;
  tb.querySelector('#pm')?.addEventListener('click',()=>{ST.m--;if(ST.m<0){ST.m=11;ST.y--;}load();render();});
  tb.querySelector('#nm')?.addEventListener('click',()=>{ST.m++;if(ST.m>11){ST.m=0;ST.y++;}load();render();});
  tb.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{ST.tab=b.dataset.tab;render();}));
  tb.querySelector('#rec-btn')?.addEventListener('click',()=>{ST.recSheet=true;renderRecSheet();});
  tb.querySelector('#wakelock-btn')?.addEventListener('click',()=>{
    if(wakeLockEnabled)releaseWakeLock();else requestWakeLock();
  });
  tb.querySelector('#do-install')?.addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;ST.showInstall=false;render();})}});
  tb.querySelector('#close-install')?.addEventListener('click',()=>{ST.showInstall=false;render();});
  updateWakeLockBtn();
}

function renderScroll(stats){
  const sa=document.getElementById('scroll-area');
  if(ST.view==='month')sa.innerHTML=buildMonth();
  else if(ST.view==='week')sa.innerHTML=buildWeek();
  else sa.innerHTML=buildSummary(stats);
  attachScrollEv(sa);
}

function renderBottomTabs(){
  const bt=document.getElementById('bottom-tabs');
  const tabs=[
    {id:'month',icon:'📅',label:'Miesiąc'},
    {id:'week',icon:'📋',label:'Tydzień'},
    {id:'summary',icon:'📊',label:'Raport'},
    {id:'print',icon:'🖨️',label:'Drukuj'},
  ];
  bt.innerHTML=tabs.map(t=>`
    <button class="btab ${ST.view===t.id?'act':''}" data-bview="${t.id}">
      <span class="btab-icon">${t.icon}</span>
      <span>${t.label}</span>
    </button>
  `).join('');
  bt.querySelectorAll('[data-bview]').forEach(b=>b.addEventListener('click',()=>{
    if(b.dataset.bview==='print'){window.print();return;}
    ST.view=b.dataset.bview;render();
  }));
}

function buildMonth(){
  const D=dim(ST.y,ST.m);const fd=fdow(ST.y,ST.m);const td=todays();
  const prevD=dim(ST.y,ST.m-1<0?11:ST.m-1);
  let cells='';
  for(let i=0;i<fd;i++)cells+=`<div class="day-cell other-m"><div class="day-num">${prevD-fd+1+i}</div></div>`;
  for(let d=1;d<=D;d++){
    const dstr=ds(ST.y,ST.m,d);const isT=dstr===td;const we=isWE(ST.y,ST.m,d);
    const tasks=getTasks(dstr);
    const fil=(ST.tab==='all'?tasks:tasks.filter(t=>t.son===ST.tab))
      .slice().sort((a,b)=>SONS.findIndex(s=>s.id===a.son)-SONS.findIndex(s=>s.id===b.son));
    const vis=fil.slice(0,3);const extra=fil.length-3;
    cells+=`<div class="day-cell${isT?' today':''}${we?' weekend-bg':''}" data-date="${dstr}">
      <div class="day-num">${d}${we?'<span class="we-tag">W</span>':''}</div>
      ${vis.map(t=>{
        const s=sonById(t.son);if(!s)return'';
        return `<div class="task-block">
          <div class="task-son-lbl" style="color:${s.color}">${s.name}</div>
          <div class="task-chip ${s.cc}${t.done?' done':''}${t.isRec?' chip-rec':''}"
            data-date="${dstr}" data-taskson="${t.son}" data-taskname="${t.name}"
            data-isrec="${t.isRec?1:0}" data-recid="${t.id||''}">
            ${t.priority==='high'?'<span style="font-size:10px">&#9733;</span>':''}
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:62px">${t.name}</span>
            ${t.isRec?'<span style="font-size:9px;opacity:0.55">&#8635;</span>':''}
          </div>
        </div>`;
      }).join('')}
      ${extra>0?`<div class="more-b">+${extra}</div>`:''}
    </div>`;
  }
  const tot=fd+D;const rem=tot%7===0?0:7-(tot%7);
  for(let i=1;i<=rem;i++)cells+=`<div class="day-cell other-m"><div class="day-num">${i}</div></div>`;
  return `<div class="cal-grid">${DPL.map(d=>`<div class="day-lbl">${d}</div>`).join('')}${cells}</div>`;
}

function buildWeek(){
  const D=dim(ST.y,ST.m);const fd=fdow(ST.y,ST.m);const td=todays();
  let weeks=[];let wk=[];
  for(let i=0;i<fd;i++)wk.push(null);
  for(let d=1;d<=D;d++){wk.push(d);if(wk.length===7){weeks.push(wk);wk=[];}}
  if(wk.length>0){while(wk.length<7)wk.push(null);weeks.push(wk);}
  const sons=ST.tab==='all'?SONS:SONS.filter(s=>s.id===ST.tab);
  return `<div>
    <div class="week-row" style="margin-bottom:4px">
      <div></div>${DPL.map(d=>`<div class="week-head">${d}</div>`).join('')}
    </div>
    ${weeks.map((wk,wi)=>`
      <div class="week-section">
        <div class="week-label">Tydzień ${wi+1}</div>
        ${sons.map(s=>`
          <div class="week-row">
            <div class="week-son">
              <span style="width:8px;height:8px;border-radius:50%;background:${s.color};display:inline-block;flex-shrink:0"></span>
              ${s.name.substring(0,3)}
            </div>
            ${wk.map(d=>{
              if(!d)return`<div class="wcell" style="opacity:0.12"></div>`;
              const dstr=ds(ST.y,ST.m,d);const isT=dstr===td;
              const tasks=getTasks(dstr).filter(t=>t.son===s.id);
              return `<div class="wcell${isT?' tod':''}" data-date="${dstr}">
                <div style="font-size:10px;color:var(--text3);margin-bottom:1px">${d}</div>
                ${tasks.slice(0,2).map(t=>`<div class="task-chip ${s.cc}${t.done?' done':''}" style="font-size:10px;padding:2px 3px;margin-bottom:2px">
                  <span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:48px;display:inline-block">${t.name}</span>
                </div>`).join('')}
                ${tasks.length>2?`<div class="more-b">+${tasks.length-2}</div>`:''}
              </div>`;
            }).join('')}
          </div>
        `).join('')}
      </div>
    `).join('')}
  </div>`;
}

function buildSummary(stats){
  const sons=ST.tab==='all'?SONS:SONS.filter(s=>s.id===ST.tab);
  let html=sons.map(s=>{
    const st=stats[s.id];const pct=st.total?Math.round(st.done/st.total*100):0;
    return `<div class="sum-card">
      <div class="sum-name"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};display:inline-block"></span>${s.name}</div>
      <div class="sum-grid">
        <div class="sum-box"><div class="sum-num">${st.total}</div><div class="sum-lbl">Zadań</div></div>
        <div class="sum-box"><div class="sum-num" style="color:${s.color}">${st.done}</div><div class="sum-lbl">Wykonanych</div></div>
        <div class="sum-box"><div class="sum-num">${st.total-st.done}</div><div class="sum-lbl">Pozostałych</div></div>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:5px">
        <div style="height:100%;width:${pct}%;background:${s.color};border-radius:4px"></div>
      </div>
      <div style="font-size:12px;color:var(--text2);text-align:right;margin-bottom:6px">${pct}% ukończonych</div>
      <div class="cp">${CATS.map(c=>st.cats[c.id]?`<span class="cp-pill">${c.l}: ${st.cats[c.id]}</span>`:'').join('')}
      ${!Object.values(st.cats).some(v=>v)?`<span style="font-size:12px;color:var(--text3)">Brak zadań</span>`:''}</div>
    </div>`;
  }).join('');
  let tot=0,don=0;SONS.forEach(s=>{tot+=stats[s.id].total;don+=stats[s.id].done;});
  const p=tot?Math.round(don/tot*100):0;
  html+=`<div class="sum-card">
    <div style="font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)">Łącznie — ${MPL[ST.m]} ${ST.y}</div>
    <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:8px">
      <span style="font-size:24px;font-weight:700;color:var(--text)">${don}<span style="font-size:14px;color:var(--text2)">/${tot}</span></span>
      <span style="font-size:13px;color:var(--text2)">zadań wykonanych (${p}%)</span>
    </div>
    <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${p}%;background:#378ADD;border-radius:4px"></div>
    </div>
  </div>`;
  return html;
}

function attachScrollEv(sa){
  sa.querySelectorAll('.day-cell[data-date],.wcell[data-date]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('.task-chip')||e.target.closest('.task-block'))return;
    ST.sheet={date:el.dataset.date};renderSheet();
  }));
  sa.querySelectorAll('.task-chip[data-date]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const date=el.dataset.date;const isRec=el.dataset.isrec==='1';
    if(isRec){
      const rt=(ST.recTasks||[]).find(r=>r.id===el.dataset.recid);
      if(rt)toggleTask(date,{...rt,isRec:true,done:!!(ST.tasks[date+'_rec_'+rt.id])});
    } else {
      const arr=ST.tasks[date]||[];const t=arr.find(t=>t.son===el.dataset.taskson&&t.name===el.dataset.taskname&&!t.isRec);
      if(t){t.done=!t.done;save();render();}
    }
  }));
}

function buildTaskList(date,fil){
  const sorted=fil.slice().sort((a,b)=>SONS.findIndex(s=>s.id===a.son)-SONS.findIndex(s=>s.id===b.son));
  if(sorted.length===0)return`<div style="color:var(--text3);font-size:13px;padding:8px 0">Brak zadań. Dodaj pierwsze!</div>`;
  return sorted.map(t=>{
    const s=sonById(t.son);const c=catById(t.category);
    return `<div class="task-row${t.done?' done-r':''}">
      <input type="checkbox" ${t.done?'checked':''} class="tchk"
        data-date="${date}" data-son="${t.son}" data-name="${t.name}"
        data-isrec="${t.isRec?1:0}" data-recid="${t.id||''}">
      <div class="tri">
        <div class="trn" style="color:${t.done?'var(--text3)':s.color}">${t.priority==='high'?'&#9733; ':''}${t.name}${t.isRec?' &#8635;':''}</div>
        <div class="trm"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${s.color};margin-right:4px;vertical-align:middle"></span>${s.name} · ${c.l}${t.isRec?' · Cykliczne':''}</div>
      </div>
      ${!t.isRec?`<button class="delbtn dtsk" data-date="${date}" data-son="${t.son}" data-name="${t.name}">&#215;</button>`:''}
    </div>`;
  }).join('');
}

function refreshTaskList(el,date){
  load();
  const tasks=getTasks(date);
  const fil=ST.tab==='all'?tasks:tasks.filter(t=>t.son===ST.tab);
  const tl=el.querySelector('#task-list');
  if(tl)tl.innerHTML=buildTaskList(date,fil);
  attachTaskListEv(el,date);
}

function attachTaskListEv(el,date){
  el.querySelectorAll('.tchk').forEach(cb=>cb.addEventListener('change',()=>{
    const isRec=cb.dataset.isrec==='1';
    if(isRec){const rt=(ST.recTasks||[]).find(r=>r.id===cb.dataset.recid);if(rt)toggleTask(cb.dataset.date,{...rt,isRec:true,done:!cb.checked});}
    else{const arr=ST.tasks[cb.dataset.date]||[];const t=arr.find(t=>t.son===cb.dataset.son&&t.name===cb.dataset.name&&!t.isRec);if(t){t.done=!t.done;save();}}
    refreshTaskList(el,date);
    renderTopbar(calcStats());
  }));
  el.querySelectorAll('.dtsk').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const arr=ST.tasks[b.dataset.date]||[];const t=arr.find(t=>t.son===b.dataset.son&&t.name===b.dataset.name);
    if(t){deleteManualTask(b.dataset.date,t);refreshTaskList(el,date);renderTopbar(calcStats());}
  }));
}

function renderSheet(){
  let el=document.getElementById('sheet-container');
  if(!el){el=document.createElement('div');el.id='sheet-container';document.body.appendChild(el);}
  const{date}=ST.sheet;
  const dn=new Date(date);const dlbl=DPL[(dn.getDay()+6)%7];const dayN=dn.getDate();
  const tasks=getTasks(date);
  const fil=ST.tab==='all'?tasks:tasks.filter(t=>t.son===ST.tab);
  el.innerHTML=`<div class="sheet-ov" id="sov">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <button class="sheet-close" id="sclose">&#215;</button>
      <h3>${dlbl}, ${dayN} ${MPL[ST.m]}</h3>
      <div id="task-list">${buildTaskList(date,fil)}</div>
      <div class="add-form">
        <div class="form-lbl">Dodaj jednorazowe zadanie</div>
        <input type="text" id="tn" placeholder="Nazwa zadania..." maxlength="60" autocomplete="off">
        <div class="r2">
          <select id="tson"><option value="">Wybierz syna</option>${SONS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
          <select id="tcat">${CATS.map(c=>`<option value="${c.id}">${c.l}</option>`).join('')}</select>
        </div>
        <div class="form-lbl">Priorytet</div>
        <div class="prow">
          <button class="pbtn s" id="prio-normal" data-prio="normal">Zwykłe</button>
          <button class="pbtn" id="prio-high" data-prio="high">&#9733; Ważne</button>
        </div>
        <button class="abtn" id="add-task-btn">Dodaj zadanie</button>
      </div>
    </div>
  </div>`;

  let currentPrio='normal';

  el.querySelector('#sov').addEventListener('click',e=>{if(e.target.id==='sov'){ST.sheet=null;el.innerHTML='';render();}});
  el.querySelector('#sclose').addEventListener('click',()=>{ST.sheet=null;el.innerHTML='';render();});

  attachTaskListEv(el,date);

  el.querySelector('#prio-normal').addEventListener('click',()=>{
    currentPrio='normal';
    el.querySelector('#prio-normal').classList.add('s');
    el.querySelector('#prio-high').classList.remove('s');
  });
  el.querySelector('#prio-high').addEventListener('click',()=>{
    currentPrio='high';
    el.querySelector('#prio-high').classList.add('s');
    el.querySelector('#prio-normal').classList.remove('s');
  });

  el.querySelector('#add-task-btn').addEventListener('click',()=>{
    const name=el.querySelector('#tn').value.trim();
    const son=el.querySelector('#tson').value;
    const cat=el.querySelector('#tcat').value;
    if(!name||!son){
      if(!name)el.querySelector('#tn').style.borderColor='#E24B4A';
      if(!son)el.querySelector('#tson').style.borderColor='#E24B4A';
      return;
    }
    addTask(date,{name,son,category:cat||'other',priority:currentPrio,done:false});
    el.querySelector('#tn').value='';
    el.querySelector('#tson').value='';
    el.querySelector('#tcat').value='school';
    el.querySelector('#tn').style.borderColor='';
    el.querySelector('#tson').style.borderColor='';
    currentPrio='normal';
    el.querySelector('#prio-normal').classList.add('s');
    el.querySelector('#prio-high').classList.remove('s');
    refreshTaskList(el,date);
    renderTopbar(calcStats());
    renderScroll(calcStats());
  });
}

function buildRecList(el){
  const recTypes=[
    {id:'month',l:'Każdy dzień'},
    {id:'month_noweekend',l:'Dni robocze (pon–pt)'},
    {id:'month_weekend',l:'Tylko weekendy (sob–nie)'},
    {id:'week',l:'Wybrane dni tygodnia'}
  ];
  const panel=el.querySelector('#rec-active-panel');
  if(!panel)return;
  if((ST.recTasks||[]).length===0){panel.innerHTML='';return;}
  panel.innerHTML=`<div class="form-lbl" style="margin-bottom:6px">Aktywne</div>
    <div class="rec-panel">
      ${ST.recTasks.map(rt=>{
        const s=sonById(rt.son);const rl=recTypes.find(r=>r.id===rt.type)||recTypes[0];
        const dl=rt.type==='week'&&rt.days?rt.days.map(d=>DPL[d]).join(', '):'';
        return `<div class="rec-row">
          <span style="width:9px;height:9px;border-radius:50%;background:${s.color};flex-shrink:0;display:inline-block"></span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${s.color}">${rt.name}</span>
          <span class="rec-badge">${s.name}</span>
          <span class="rec-badge">${rl.l}${dl?' ('+dl+')':''}</span>
          <button class="delbtn" data-recid="${rt.id}">&#215;</button>
        </div>`;
      }).join('')}
    </div>`;
  panel.querySelectorAll('.delbtn[data-recid]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();deleteRec(b.dataset.recid);buildRecList(el);renderTopbar(calcStats());renderScroll(calcStats());
  }));
}

function renderRecSheet(){
  let el=document.getElementById('rec-sheet-container');
  if(!el){el=document.createElement('div');el.id='rec-sheet-container';document.body.appendChild(el);}

  let localPrio='normal';
  let localRecType='month';
  let localDays=[];

  const recTypes=[
    {id:'month',l:'Każdy dzień'},
    {id:'month_noweekend',l:'Dni robocze\n(pon–pt)'},
    {id:'month_weekend',l:'Tylko weekendy\n(sob–nie)'},
    {id:'week',l:'Wybrane dni\ntygodnia'}
  ];

  el.innerHTML=`<div class="sheet-ov" id="rov">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <button class="sheet-close" id="rclose">&#215;</button>
      <h3>Zadania cykliczne — ${MPL[ST.m]} ${ST.y}</h3>
      <div id="rec-active-panel"></div>
      <div class="form-lbl" style="margin-top:10px">Nowe zadanie cykliczne</div>
      <input type="text" id="rn" placeholder="Nazwa zadania..." maxlength="60" autocomplete="off" style="width:100%;margin-bottom:8px;padding:12px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text)">
      <div class="r2" style="margin-bottom:8px">
        <select id="rson" style="padding:12px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);-webkit-appearance:none;width:100%">
          <option value="">Wybierz syna</option>${SONS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
        <select id="rcat" style="padding:12px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);-webkit-appearance:none;width:100%">
          ${CATS.map(c=>`<option value="${c.id}">${c.l}</option>`).join('')}
        </select>
      </div>
      <div class="form-lbl">Powtarzaj w</div>
      <div class="rec-type-grid" id="rec-type-grid">
        ${recTypes.map(r=>`<button class="rec-type-btn${r.id==='month'?' s':''}" data-rectype="${r.id}">${r.l}</button>`).join('')}
      </div>
      <div id="days-picker" style="display:none" class="days-grid">
        ${DPL.map((d,i)=>`<button class="day-btn" data-day="${i}">${d}</button>`).join('')}
      </div>
      <div class="form-lbl">Priorytet</div>
      <div class="prow">
        <button class="pbtn s" id="rprio-normal">Zwykłe</button>
        <button class="pbtn" id="rprio-high">&#9733; Ważne</button>
      </div>
      <button class="abtn" id="add-rec-btn">Dodaj zadanie cykliczne</button>
    </div>
  </div>`;

  buildRecList(el);

  el.querySelector('#rov').addEventListener('click',e=>{if(e.target.id==='rov'){ST.recSheet=false;el.innerHTML='';render();}});
  el.querySelector('#rclose').addEventListener('click',()=>{ST.recSheet=false;el.innerHTML='';render();});

  el.querySelectorAll('[data-rectype]').forEach(b=>b.addEventListener('click',()=>{
    localRecType=b.dataset.rectype;
    el.querySelectorAll('[data-rectype]').forEach(x=>x.classList.remove('s'));
    b.classList.add('s');
    el.querySelector('#days-picker').style.display=localRecType==='week'?'flex':'none';
  }));

  el.querySelectorAll('[data-day]').forEach(b=>b.addEventListener('click',()=>{
    const d=parseInt(b.dataset.day);
    const idx=localDays.indexOf(d);
    if(idx>=0)localDays.splice(idx,1);else localDays.push(d);
    b.classList.toggle('s',localDays.includes(d));
  }));

  el.querySelector('#rprio-normal').addEventListener('click',()=>{
    localPrio='normal';
    el.querySelector('#rprio-normal').classList.add('s');
    el.querySelector('#rprio-high').classList.remove('s');
  });
  el.querySelector('#rprio-high').addEventListener('click',()=>{
    localPrio='high';
    el.querySelector('#rprio-high').classList.add('s');
    el.querySelector('#rprio-normal').classList.remove('s');
  });

  el.querySelector('#add-rec-btn').addEventListener('click',()=>{
    const name=el.querySelector('#rn').value.trim();
    const son=el.querySelector('#rson').value;
    const cat=el.querySelector('#rcat').value;
    if(!name||!son){
      if(!name)el.querySelector('#rn').style.borderColor='#E24B4A';
      if(!son)el.querySelector('#rson').style.borderColor='#E24B4A';
      return;
    }
    if(localRecType==='week'&&localDays.length===0){
      el.querySelector('#days-picker').style.outline='1px solid #E24B4A';
      return;
    }
    addRec({id:'rec_'+Date.now(),name,son,category:cat||'other',priority:localPrio,type:localRecType,days:localRecType==='week'?[...localDays]:null});
    el.querySelector('#rn').value='';
    el.querySelector('#rson').value='';
    el.querySelector('#rcat').value='school';
    el.querySelector('#rn').style.borderColor='';
    el.querySelector('#rson').style.borderColor='';
    localPrio='normal';localRecType='month';localDays=[];
    el.querySelector('#rprio-normal').classList.add('s');
    el.querySelector('#rprio-high').classList.remove('s');
    el.querySelectorAll('[data-rectype]').forEach(x=>x.classList.remove('s'));
    el.querySelector('[data-rectype="month"]').classList.add('s');
    el.querySelectorAll('[data-day]').forEach(x=>x.classList.remove('s'));
    el.querySelector('#days-picker').style.display='none';
    buildRecList(el);
    renderTopbar(calcStats());
    renderScroll(calcStats());
  });
}

// PWA install prompt
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;render();
});

// Service Worker registration
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Wake Lock — keeps screen on ──
let wakeLock=null;
let wakeLockEnabled=false;

async function requestWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{
    wakeLock=await navigator.wakeLock.request('screen');
    wakeLockEnabled=true;
    updateWakeLockBtn();
    wakeLock.addEventListener('release',()=>{
      if(wakeLockEnabled)requestWakeLock();
    });
  }catch(e){wakeLockEnabled=false;updateWakeLockBtn();}
}

async function releaseWakeLock(){
  if(wakeLock){try{await wakeLock.release();}catch(e){}}
  wakeLock=null;wakeLockEnabled=false;
  updateWakeLockBtn();
}

function updateWakeLockBtn(){
  const btn=document.getElementById('wakelock-btn');
  if(!btn)return;
  btn.textContent=wakeLockEnabled?'Ekran: wł.':'Ekran: auto';
  btn.style.borderColor=wakeLockEnabled?'#3B6D11':'var(--border2)';
  btn.style.color=wakeLockEnabled?'#3B6D11':'var(--text2)';
  btn.style.background=wakeLockEnabled?'#EAF3DE':'transparent';
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&wakeLockEnabled)requestWakeLock();
});

render();
requestWakeLock();
</script>
